<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TUS Trip Boarding Scanner</title>
<script src="https://unpkg.com/@zxing/library@0.21.3"></script>
<script src="https://unpkg.com/@zxing/browser@0.1.5"></script>
<style>
  :root{
    --bg:#0d1117;
    --panel:#161b22;
    --line:#2a3038;
    --text:#e6edf3;
    --muted:#8b949e;
    --accent:#3b82f6;
    --good:#16a34a;
    --good-bg:#0f2917;
    --bad:#dc2626;
    --bad-bg:#2a1112;
    --warn:#d97706;
    --warn-bg:#2a1f0d;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overscroll-behavior:none;
    -webkit-tap-highlight-color:transparent;
  }
  #app{
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }
  header{
    padding:14px 16px 10px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .brand{
    display:flex;
    flex-direction:column;
    line-height:1.15;
  }
  .brand .eyebrow{
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:600;
  }
  .brand .title{
    font-size:17px;
    font-weight:700;
  }
  select#busSelect{
    background:var(--panel);
    color:var(--text);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    font-size:15px;
    font-weight:600;
    appearance:none;
    min-width:108px;
    text-align:center;
  }
  #counts{
    display:flex;
    gap:8px;
    padding:10px 16px;
    overflow-x:auto;
    border-bottom:1px solid var(--line);
  }
  .count-chip{
    flex:0 0 auto;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:999px;
    padding:6px 12px;
    font-size:12.5px;
    color:var(--muted);
    font-weight:600;
    white-space:nowrap;
  }
  .count-chip b{ color:var(--text); }

  main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:16px;
    position:relative;
  }

  /* Scanner view */
  #scanView{
    width:100%;
    max-width:480px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
  }
  .camera-wrap{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    background:#000;
    border-radius:20px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  #video{
    width:100%;
    height:100%;
    object-fit:cover;
  }
  .scan-frame{
    position:absolute;
    inset:12%;
    border:3px solid rgba(255,255,255,0.55);
    border-radius:18px;
    box-shadow:0 0 0 9999px rgba(0,0,0,0.25);
  }
  .scan-frame::before,.scan-frame::after,
  .corner-tl,.corner-br{ content:""; }
  .scan-line{
    position:absolute;
    left:12%;
    right:12%;
    height:2px;
    background:var(--accent);
    box-shadow:0 0 12px var(--accent);
    animation:sweep 2.1s ease-in-out infinite;
  }
  @keyframes sweep{
    0%{ top:13%; opacity:.9;}
    50%{ top:85%; opacity:.5;}
    100%{ top:13%; opacity:.9;}
  }
  .hint{
    color:var(--muted);
    font-size:13.5px;
    text-align:center;
  }
  #camError{
    color:var(--warn);
    font-size:13.5px;
    text-align:center;
    display:none;
    max-width:340px;
  }
  .manual-toggle{
    background:none;
    border:1px solid var(--line);
    color:var(--muted);
    border-radius:10px;
    padding:9px 14px;
    font-size:13px;
    font-weight:600;
  }
  #manualEntry{
    display:none;
    width:100%;
    flex-direction:column;
    gap:8px;
  }
  #manualEntry input{
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:10px;
    padding:12px 14px;
    font-size:16px;
    width:100%;
  }
  #manualEntry button{
    background:var(--accent);
    color:white;
    border:none;
    border-radius:10px;
    padding:12px;
    font-size:15px;
    font-weight:700;
  }

  /* Result view */
  #resultView{
    display:none;
    width:100%;
    max-width:480px;
    height:100%;
    min-height:60vh;
    border-radius:20px;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:32px 24px;
    gap:6px;
  }
  #resultView.good{ background:var(--good-bg); border:1px solid var(--good); }
  #resultView.bad{ background:var(--bad-bg); border:1px solid var(--bad); }
  #resultView.warn{ background:var(--warn-bg); border:1px solid var(--warn); }

  .result-icon{
    font-size:64px;
    line-height:1;
    margin-bottom:6px;
  }
  .result-status{
    font-size:22px;
    font-weight:800;
    letter-spacing:-0.01em;
  }
  .result-name{
    font-size:28px;
    font-weight:800;
    margin-top:4px;
  }
  .result-sub{
    font-size:15px;
    color:var(--muted);
    margin-top:8px;
    line-height:1.4;
  }
  .result-id{
    font-size:13px;
    color:var(--muted);
    margin-top:14px;
    font-family:ui-monospace,monospace;
    letter-spacing:.02em;
  }
  #nextBtn{
    margin-top:28px;
    background:var(--text);
    color:var(--bg);
    border:none;
    border-radius:14px;
    padding:16px 28px;
    font-size:16px;
    font-weight:800;
    width:100%;
    max-width:280px;
  }

  #loadingOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
  }
  .spinner{
    width:36px;height:36px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,0.25);
    border-top-color:#fff;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  footer{
    padding:10px 16px 16px;
    text-align:center;
    color:var(--muted);
    font-size:11.5px;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <span class="eyebrow">TUS Trip 2026</span>
      <span class="title">Boarding Scanner</span>
    </div>
    <select id="busSelect">
      <option>Bus 1</option>
      <option>Bus 2</option>
      <option>Bus 3</option>
      <option>Bus 4</option>
    </select>
  </header>

  <div id="counts"></div>

  <main>
    <div id="scanView">
      <div class="camera-wrap">
        <video id="video" playsinline muted autoplay></video>
        <div class="scan-frame"></div>
        <div class="scan-line"></div>
      </div>
      <div class="hint" id="hintText">Point the camera at the student's QR code</div>
      <div id="camError">Camera access is needed to scan. Check your browser permissions, or enter the ID manually below.</div>

      <button class="manual-toggle" id="torchBtn" style="display:none;">🔦 Turn on flashlight</button>
      <button class="manual-toggle" id="manualToggleBtn">Enter ID manually instead</button>
      <div id="manualEntry">
        <input id="manualInput" type="text" placeholder="e.g. A00336196" autocapitalize="characters" />
        <button id="manualSubmit">Check in</button>
      </div>
    </div>

    <div id="resultView">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-status" id="resultStatus"></div>
      <div class="result-name" id="resultName"></div>
      <div class="result-sub" id="resultSub"></div>
      <div class="result-id" id="resultId"></div>
      <button id="nextBtn">Scan next student</button>
    </div>
  </main>

  <footer>GSAHC &middot; Global Student Accommodation Help Centre</footer>
</div>

<div id="loadingOverlay"><div class="spinner"></div></div>

<script>
// ====== CONFIGURE THIS ======
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHyCj0Z_WhACksbFJ_kyjFE-VMJ5xJaAjNMgjvybu3vilEWUOoB9vDiDfzMS0UP_iC/exec";
// ============================

const video = document.getElementById('video');
const scanView = document.getElementById('scanView');
const resultView = document.getElementById('resultView');
const resultIcon = document.getElementById('resultIcon');
const resultStatus = document.getElementById('resultStatus');
const resultName = document.getElementById('resultName');
const resultSub = document.getElementById('resultSub');
const resultId = document.getElementById('resultId');
const nextBtn = document.getElementById('nextBtn');
const busSelect = document.getElementById('busSelect');
const camError = document.getElementById('camError');
const hintText = document.getElementById('hintText');
const loadingOverlay = document.getElementById('loadingOverlay');
const manualToggleBtn = document.getElementById('manualToggleBtn');
const manualEntry = document.getElementById('manualEntry');
const manualInput = document.getElementById('manualInput');
const manualSubmit = document.getElementById('manualSubmit');
const torchBtn = document.getElementById('torchBtn');

let counts = { 'Bus 1':0, 'Bus 2':0, 'Bus 3':0, 'Bus 4':0 };
let codeReader = null;
let activeControls = null;
let currentStream = null;
let torchOn = false;
let busy = false; // prevents double-fires while a scan is being processed

function renderCounts(){
  const el = document.getElementById('counts');
  el.innerHTML = Object.entries(counts).map(([bus,n]) =>
    `<div class="count-chip">${bus}: <b>${n}</b></div>`
  ).join('');
}
renderCounts();

// ZXing hints: restrict to QR_CODE only for speed, and allow some tolerance
function buildHints(){
  const hints = new Map();
  const formats = [ZXing.BarcodeFormat.QR_CODE];
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
  return hints;
}

async function startCamera(){
  codeReader = new ZXingBrowser.BrowserMultiFormatReader(buildHints(), { delayBetweenScanAttempts: 100 });

  const onResult = (result, err, controls) => {
    if(result && !busy){
      busy = true;
      handleScan(result.getText().trim());
    }
  };

  // Try preferred constraints first (back camera by device label), then fall back
  // to a simpler facingMode-only constraint if that fails (some iOS Safari versions
  // reject deviceId:{exact:...} in certain states).
  let lastErr = null;

  try{
    const devices = await ZXingBrowser.BrowserCodeReader.listVideoInputDevices();
    let deviceId = devices[0] ? devices[0].deviceId : undefined;
    const backCam = devices.find(d => /back|rear|environment/i.test(d.label));
    if(backCam) deviceId = backCam.deviceId;

    if(deviceId){
      activeControls = await codeReader.decodeFromConstraints(
        { video: { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 1280 } } },
        video,
        onResult
      );
    }
  }catch(err){
    lastErr = err;
  }

  if(!activeControls){
    try{
      activeControls = await codeReader.decodeFromConstraints(
        { video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 1280 } } },
        video,
        onResult
      );
    }catch(err){
      lastErr = err;
    }
  }

  if(!activeControls){
    camError.style.display = "block";
    camError.textContent = "Camera couldn't start" + (lastErr ? " (" + (lastErr.message || lastErr) + ")" : "") + ". Use manual entry below.";
    hintText.style.display = "none";
    return;
  }

  currentStream = video.srcObject;
  camError.style.display = "none";

  const track = currentStream.getVideoTracks()[0];
  const caps = track.getCapabilities ? track.getCapabilities() : {};
  if(caps.torch){
    torchBtn.style.display = "inline-block";
  }
}

async function toggleTorch(){
  if(!currentStream) return;
  const track = currentStream.getVideoTracks()[0];
  torchOn = !torchOn;
  try{
    await track.applyConstraints({ advanced: [{ torch: torchOn }] });
    torchBtn.textContent = torchOn ? "🔦 Turn off flashlight" : "🔦 Turn on flashlight";
  }catch(e){
    // Some browsers/devices reject this silently - no-op
  }
}
torchBtn.addEventListener('click', toggleTorch);

function resumeScanning(){
  resultView.style.display = "none";
  resultView.className = "";
  scanView.style.display = "flex";
  busy = false;
}

nextBtn.addEventListener('click', resumeScanning);

manualToggleBtn.addEventListener('click', () => {
  const showing = manualEntry.style.display === "flex";
  manualEntry.style.display = showing ? "none" : "flex";
  manualToggleBtn.textContent = showing ? "Enter ID manually instead" : "Hide manual entry";
});

manualSubmit.addEventListener('click', () => {
  const val = manualInput.value.trim();
  if(!val || busy) return;
  busy = true;
  handleScan(val);
  manualInput.value = "";
});

async function handleScan(studentId){
  loadingOverlay.style.display = "flex";
  const bus = busSelect.value;
  try{
    const url = `${SCRIPT_URL}?action=checkin&studentId=${encodeURIComponent(studentId)}&bus=${encodeURIComponent(bus)}`;
    const res = await fetch(url);
    const data = await res.json();
    showResult(data, bus);
  }catch(err){
    showResult({ result: "ERROR", message: "Could not reach the sheet. Check your connection." }, bus);
  }finally{
    loadingOverlay.style.display = "none";
  }
}

function showResult(data, bus){
  scanView.style.display = "none";
  resultView.style.display = "flex";
  resultId.textContent = data.studentId ? data.studentId : "";

  if(data.result === "SUCCESS"){
    resultView.className = "good";
    resultIcon.textContent = "✅";
    resultStatus.textContent = "BOARDING CONFIRMED";
    resultName.textContent = data.name || "";
    resultSub.textContent = `${data.bus || bus} · checked in at ${data.time || ""}`;
    counts[bus] = (counts[bus] || 0) + 1;
    renderCounts();
    if(navigator.vibrate) navigator.vibrate(80);
  } else if(data.result === "UNPAID"){
    resultView.className = "bad";
    resultIcon.textContent = "❌";
    resultStatus.textContent = "PAYMENT NOT CONFIRMED";
    resultName.textContent = data.name || "";
    resultSub.textContent = "Do not allow boarding. Send to the accommodation desk.";
    if(navigator.vibrate) navigator.vibrate([60,60,60]);
  } else if(data.result === "ALREADY_BOARDED"){
    resultView.className = "warn";
    resultIcon.textContent = "⚠️";
    resultStatus.textContent = "ALREADY BOARDED";
    resultName.textContent = data.name || "";
    resultSub.textContent = data.message || "";
    if(navigator.vibrate) navigator.vibrate([60,60,60]);
  } else if(data.result === "NOT_FOUND"){
    resultView.className = "bad";
    resultIcon.textContent = "❌";
    resultStatus.textContent = "NOT FOUND";
    resultName.textContent = "";
    resultSub.textContent = "This ID isn't on the list. Check the code or try manual entry.";
    if(navigator.vibrate) navigator.vibrate([60,60,60]);
  } else {
    resultView.className = "warn";
    resultIcon.textContent = "⚠️";
    resultStatus.textContent = "SOMETHING WENT WRONG";
    resultName.textContent = "";
    resultSub.textContent = data.message || "Unknown error. Try again.";
  }
}

startCamera();
</script>
</body>
</html>
